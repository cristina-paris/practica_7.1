name: Granxa Animales Node.js #

on: #
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs: #
  build:
    runs-on: ubuntu-latest #
    steps: #
      - name: Checkout repository #
        uses: actions/checkout@v6 #

      - name: Use Node.js
        uses: actions/setup-node@v6 #
        with:
          node-version: 24
      - name: Run npm #
        run: npm ci

      - name: Run tests
        run: npm test
