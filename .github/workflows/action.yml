name: CI/CD pipeline

on: #
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs: #
  build-and-test:
    runs-on: ubuntu-latest #
    steps: #
      - name: Checkout repository #
        uses: actions/checkout@v6 #

      - name: Use Node.js
        uses: actions/setup-node@v6 #
        with:
          node-version: 24
      - name: Run npm #
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest #
    if: success()
    steps:
      - name: Despregamento en produción #
        run: echo "Despregando a aplicación..."
